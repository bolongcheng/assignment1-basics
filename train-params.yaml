# Data paths
train_data: data/tokens/tinystories-train.bin
val_data: data/tokens/tinystories-val.bin

# Model parameters
vocab_size: 10000
context_length: 256
num_layers: 4
num_heads: 6
d_model: 512
d_ff: 1344
rope_theta: 10000.0

# Optimizer parameters
learning_rate: 1e-4
weight_decay: 0.1
beta1: 0.9
beta2: 0.95

grad_clip: 1.0

lr_min: 3e-5
lr_max: 3e-4
T_w: 800
T_c: 38000

# Training parameters
batch_size: 32
max_iters: 40000

# Logging and evaluation
log_interval: 10
wandb_project: "cs336-gpt-mini"
wandb_run_name: "run1"

# Evaluation
eval_interval: 500
eval_num_batches: 50

# Checkpointing
checkpoint_interval: 1000
checkpoint_dir: checkpoints
resume_from: null

# Misc
device: cpu
seed: 123


