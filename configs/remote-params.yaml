# Data paths
train_path: data/tokens/tinystories-train.bin
valid_path: data/tokens/tinystories-val.bin

# Model parameters
vocab_size: 10000
context_length: 256
num_layers: 4
num_heads: 16
d_model: 512
d_ff: 1344
rope_theta: 10000.0

# Optimizer parameters
weight_decay: 0.1
beta1: 0.9
beta2: 0.99

max_l2_norm: 1.0

# scheduler parameters
lr_max: 0.001
lr_min_ratio: 0.1
warmup_pct: 0.05
cooldown_pct: 0.95

# Training parameters
batch_size: 32
max_iters: 40000

# Logging and evaluation
log_interval: 20
activation_log_interval: 100
wandb_project: "cs336-assignment1"
wandb_run_name: "baseline"

# Evaluation
eval_interval: 400
eval_num_batches: 200

# Checkpointing
checkpoint_interval: 5000
checkpoint_dir: checkpoints
resume_from: null

# Misc
device: cuda
seed: 123